<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Conferência de Estoque – Ferramentaria N11</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #f5a623;
    --accent2: #3b82f6;
    --ok: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–sans);
min-height: 100vh;
padding-bottom: 130px;
}

header {
background: var(–surface);
border-bottom: 2px solid var(–accent);
padding: 14px 16px 12px;
position: sticky;
top: 0;
z-index: 100;
}

.header-top {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 8px;
}

.header-icon {
width: 38px; height: 38px;
background: var(–accent);
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 20px;
flex-shrink: 0;
}

header h1 {
font-size: 14px;
font-weight: 700;
letter-spacing: 0.04em;
text-transform: uppercase;
color: var(–text);
line-height: 1.2;
}

header p {
font-size: 11px;
color: var(–muted);
font-family: var(–mono);
margin-top: 1px;
}

.progress-bar {
height: 4px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
margin-top: 10px;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent), var(–ok));
border-radius: 2px;
transition: width 0.3s ease;
width: 0%;
}

.progress-label {
font-size: 10px;
font-family: var(–mono);
color: var(–muted);
margin-top: 4px;
text-align: right;
}

.section-header {
background: var(–surface2);
border-left: 3px solid var(–accent2);
padding: 9px 16px;
font-size: 10px;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
font-family: var(–mono);
position: sticky;
top: 118px;
z-index: 90;
}

.item-card {
border-bottom: 1px solid var(–border);
padding: 13px 16px;
background: var(–surface);
transition: background 0.2s;
}

.item-card.filled { background: #151e2e; }

.item-name {
font-size: 13px;
font-weight: 600;
color: var(–text);
margin-bottom: 3px;
line-height: 1.35;
}

.item-code {
font-size: 10px;
font-family: var(–mono);
color: var(–muted);
margin-bottom: 9px;
}

.item-meta {
display: flex;
gap: 7px;
margin-bottom: 10px;
}

.badge {
font-family: var(–mono);
font-size: 10px;
padding: 2px 7px;
border-radius: 4px;
font-weight: 600;
border: 1px solid;
}

.badge-min { color: var(–warn); border-color: var(–warn); background: rgba(245,158,11,0.08); }
.badge-max { color: var(–accent2); border-color: var(–accent2); background: rgba(59,130,246,0.08); }

.input-row {
display: flex;
align-items: center;
gap: 8px;
}

.input-label {
font-size: 11px;
color: var(–muted);
font-family: var(–mono);
white-space: nowrap;
min-width: 68px;
}

.qty-input {
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: var(–mono);
font-size: 20px;
font-weight: 700;
padding: 10px 12px;
width: 110px;
text-align: center;
outline: none;
transition: border-color 0.2s, background 0.2s;
-webkit-appearance: none;
appearance: none;
}

.qty-input:focus { border-color: var(–accent); background: #1a1500; }
.qty-input.status-ok  { border-color: var(–ok);     background: rgba(34,197,94,0.06); }
.qty-input.status-low { border-color: var(–danger);  background: rgba(239,68,68,0.08); }

.status-tag {
font-size: 10px;
font-family: var(–mono);
font-weight: 700;
padding: 4px 8px;
border-radius: 4px;
display: none;
}
.status-tag.visible { display: inline-block; }
.status-tag.ok  { background: rgba(34,197,94,0.15);  color: var(–ok); }
.status-tag.low { background: rgba(239,68,68,0.15);   color: var(–danger); }

.solicitacao-row {
display: none;
margin-top: 8px;
align-items: center;
gap: 8px;
background: rgba(239,68,68,0.07);
border-radius: 6px;
padding: 6px 10px;
}
.solicitacao-row.visible { display: flex; }
.sol-label { font-size: 11px; color: var(–muted); font-family: var(–mono); }
.sol-value { font-family: var(–mono); font-size: 15px; font-weight: 700; color: var(–danger); }

.bottom-bar {
position: fixed;
bottom: 0; left: 0; right: 0;
background: var(–surface);
border-top: 2px solid var(–border);
padding: 10px 16px 14px;
z-index: 200;
}

.bottom-bar-info {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 8px;
font-family: var(–mono);
font-size: 10px;
color: var(–muted);
}

.stat { display: flex; align-items: center; gap: 4px; }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }

.btn-generate {
width: 100%;
background: var(–accent);
color: #0f1117;
border: none;
border-radius: 10px;
font-family: var(–sans);
font-size: 14px;
font-weight: 700;
padding: 13px;
cursor: pointer;
letter-spacing: 0.04em;
text-transform: uppercase;
-webkit-appearance: none;
transition: opacity 0.15s;
}
.btn-generate:active { opacity: 0.75; }

.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.88);
z-index: 500;
padding: 16px;
overflow-y: auto;
align-items: flex-start;
justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 16px;
padding: 22px 18px;
width: 100%;
max-width: 520px;
margin: auto;
}

.modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }

.modal-date {
font-family: var(–mono);
font-size: 11px;
color: var(–muted);
margin-bottom: 14px;
}

.report-box {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px;
font-family: var(–mono);
font-size: 11.5px;
line-height: 1.7;
color: var(–text);
white-space: pre-wrap;
word-break: break-word;
max-height: 42vh;
overflow-y: auto;
margin-bottom: 14px;
}

.modal-btn-row { display: flex; gap: 8px; margin-bottom: 8px; }

.btn-modal {
flex: 1;
padding: 13px 8px;
border-radius: 10px;
font-family: var(–sans);
font-size: 12px;
font-weight: 700;
border: none;
cursor: pointer;
text-align: center;
-webkit-appearance: none;
text-decoration: none;
display: flex;
align-items: center;
justify-content: center;
gap: 5px;
transition: opacity 0.15s;
}
.btn-modal:active { opacity: 0.75; }

.btn-copy-modal { background: var(–surface2); color: var(–text); border: 1.5px solid var(–border); }
.btn-whatsapp   { background: #25d366; color: #fff; }
.btn-excel      { background: #1d6f42; color: #fff; width: 100%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px; border-radius: 10px; font-family: var(–sans); font-size: 13px; font-weight: 700; border: none; cursor: pointer; -webkit-appearance: none; }
.btn-close-modal { background: none; border: 1px solid var(–border); color: var(–muted); width: 100%; border-radius: 10px; padding: 11px; font-size: 13px; cursor: pointer; font-family: var(–sans); -webkit-appearance: none; }

.intro-section { padding: 16px 16px 0; }
.intro-label {
font-size: 10px; font-family: var(–mono);
color: var(–muted); text-transform: uppercase;
letter-spacing: 0.1em; margin-bottom: 7px;
}

.ferramenteiro-input {
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: var(–sans);
font-size: 15px;
padding: 11px 13px;
width: 100%;
outline: none;
margin-bottom: 14px;
-webkit-appearance: none;
}
.ferramenteiro-input:focus { border-color: var(–accent); }

.offline-banner {
background: rgba(59,130,246,0.10);
border: 1px solid rgba(59,130,246,0.35);
border-radius: 8px;
padding: 10px 13px;
font-size: 11px;
color: #93c5fd;
font-family: var(–mono);
margin-bottom: 14px;
line-height: 1.5;
}
</style>

</head>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>📤 Relatório de Estoque</h2>

const grupos = [...new Set(materiais.map(m => m.grupo))].sort();
const estoques = {};

function calcSol(atual, min, max) { return atual < min ? max - atual : 0; }

function buildList() {
  const now = new Date();
  document.getElementById('header-date').textContent =
    N11 – ${now.toLocaleDateString('pt-BR')};

  const container = document.getElementById('itemList');
  grupos.forEach(grupo => {
    const items = materiais.filter(m => m.grupo === grupo);
    const sec = document.createElement('div');
    sec.className = 'section-header';
    sec.textContent = 📦 ${grupo} (${items.length} itens);
    container.appendChild(sec);

    items.forEach(mat => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = card-${mat.codigo};
      card.innerHTML = `
        <div class="item-name">${mat.nome}</div>
        <div class="item-code">${mat.codigo}</div>
        <div class="item-meta">
          <span class="badge badge-min">MÍN ${mat.min}</span>
          <span class="badge badge-max">MÁX ${mat.max}</span>
        </div>
        <div class="input-row">
          <span class="input-label">ESTOQUE:</span>
          <input class="qty-input" id="qty-${mat.codigo}"
            type="number" inputmode="numeric" pattern="[0-9]*"
            min="0" placeholder="—" autocomplete="off"
            oninput="onInput('${mat.codigo}',${mat.min},${mat.max})">
          <span class="status-tag" id="tag-${mat.codigo}"></span>
        </div>
        <div class="solicitacao-row" id="sol-${mat.codigo}">
          <span class="sol-label">📦 SOLICITAR:</span>
          <span class="sol-value" id="solval-${mat.codigo}"></span>
          <span class="sol-label">unidades</span>
        </div>`;
      container.appendChild(card);
    });
  });
}

function onInput(codigo, min, max) {
  const input  = document.getElementById(qty-${codigo});
  const tag    = document.getElementById(tag-${codigo});
  const solRow = document.getElementById(sol-${codigo});
  const solVal = document.getElementById(solval-${codigo});
  const card   = document.getElementById(card-${codigo});
  const val = input.value.trim();

  if (val === '') {
    delete estoques[codigo];
    input.className = 'qty-input';
    tag.className = 'status-tag';
    solRow.className = 'solicitacao-row';
    card.className = 'item-card';
    updateStats(); return;
  }

  const atual = parseInt(val);
  estoques[codigo] = atual;
  const sol = calcSol(atual, min, max);
  const ok  = atual >= min;

  input.className  = qty-input ${ok ? 'status-ok' : 'status-low'};
  tag.className    = status-tag visible ${ok ? 'ok' : 'low'};
  tag.textContent  = ok ? '✓ OK' : '✗ BAIXO';
  card.className   = 'item-card filled';
  solRow.className = sol > 0 ? 'solicitacao-row visible' : 'solicitacao-row';
  if (sol > 0) solVal.textContent = sol;

  updateStats();
}

function updateStats() {
  const total   = materiais.length;
  const nFilled = Object.keys(estoques).length;
  const req = materiais.filter(m => estoques[m.codigo] !== undefined && calcSol(estoques[m.codigo], m.min, m.max) > 0);
  const low = materiais.filter(m => estoques[m.codigo] !== undefined && estoques[m.codigo] < m.min);
  const ok  = materiais.filter(m => estoques[m.codigo] !== undefined && estoques[m.codigo] >= m.min);

  document.getElementById('progressFill').style.width  = ${(nFilled/total)*100}%;
  document.getElementById('progressLabel').textContent  = ${nFilled} / ${total} itens conferidos;
  document.getElementById('stat-ok').textContent        = ${ok.length} OK;
  document.getElementById('stat-low').textContent       = ${low.length} Abaixo;
  document.getElementById('stat-req').textContent       = ${req.length} Solicitar;
}

function buildReport() {
  const nome    = document.getElementById('ferramenteiro').value.trim() || 'Não informado';
  const now     = new Date();
  const dataStr = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
  const horaStr = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

  const comSol  = materiais.filter(m => estoques[m.codigo] !== undefined && calcSol(estoques[m.codigo], m.min, m.max) > 0);
  const semSol  = materiais.filter(m => estoques[m.codigo] !== undefined && calcSol(estoques[m.codigo], m.min, m.max) === 0);
  const naoConf = materiais.filter(m => estoques[m.codigo] === undefined);

  let r = 🔧 *CONFERÊNCIA DE ESTOQUE – N11*\n;
  r += 📅 ${dataStr} às ${horaStr}\n;
  r += 👷 Ferramenteiro: ${nome}\n;
  r += ${'─'.repeat(34)}\n\n;

  if (comSol.length > 0) {
    r += ⚠️ *SOLICITAR (${comSol.length} itens)*\n${'─'.repeat(34)}\n;
    comSol.forEach(m => {
      const d = estoques[m.codigo];
      const s = calcSol(d, m.min, m.max);
      r += • ${m.nome}\n  Disponível: ${d} | Mín: ${m.min} | *Solicitar: ${s}*\n;
    });
    r += \n;
  }

  if (semSol.length > 0) {
    r += ✅ *ESTOQUE OK (${semSol.length} itens)*\n${'─'.repeat(34)}\n;
    semSol.forEach(m => {
      r += • ${m.nome}\n  Disponível: ${estoques[m.codigo]} | Solicitar: 0\n;
    });
    r += \n;
  }

  if (naoConf.length > 0) {
    r += ❓ *NÃO CONFERIDOS (${naoConf.length} itens)*\n${'─'.repeat(34)}\n;
    naoConf.forEach(m => { r += • ${m.nome}\n; });
    r += \n;
  }

  r += ${'─'.repeat(34)}\n;
  r += Total: ${materiais.length} | Conferidos: ${Object.keys(estoques).length} | Solicitar: ${comSol.length};
  return r;
}

function openModal() {
  const report = buildReport();
  document.getElementById('reportBox').textContent = report;
  const now = new Date();
  document.getElementById('modalDateLabel').textContent =
    now.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
  document.getElementById('whatsappLink').href =
    https://wa.me/?text=${encodeURIComponent(report)};
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyReport() {
  const text = document.getElementById('reportBox').textContent;
  const btn  = document.querySelector('.btn-copy-modal');
  const done = () => { btn.textContent = '✓ Copiado!'; setTimeout(() => btn.textContent = '📋 Copiar texto', 2000); };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(done);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); done();
  }
}

// ── EXPORTAR CSV — 100% offline, abre direto no Excel ──────────────────
function exportCSV() {
  const nome    = document.getElementById('ferramenteiro').value.trim() || 'Não informado';
  const now     = new Date();
  const dataStr = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});

  // BOM UTF-8 garante acentos no Excel
  let csv = '\uFEFF';
  csv += CONFERÊNCIA DE ESTOQUE - FERRAMENTARIA N11\n;
  csv += Data:;${dataStr}\n;
  csv += Ferramenteiro:;${nome}\n\n;
  csv += Código;Descrição;Grupo;Qtd. Mínima;Qtd. Máxima;Disponível em ${dataStr};A Solicitar;Status\n;

  const esc = v => "${String(v).replace(/"/g,'""')}";

  materiais.forEach(m => {
    const disp   = estoques[m.codigo] !== undefined ? estoques[m.codigo] : '';
    const sol    = estoques[m.codigo] !== undefined ? calcSol(estoques[m.codigo], m.min, m.max) : '';
    const status = estoques[m.codigo] !== undefined
      ? (estoques[m.codigo] >= m.min ? 'OK' : 'ABAIXO DO MÍNIMO')
      : 'NÃO CONFERIDO';
    csv += ${esc(m.codigo)};${esc(m.nome)};${esc(m.grupo)};${m.min};${m.max};${disp};${sol};${esc(status)}\n;
  });

  const fname = Estoque_N11_${dataStr.replace(/\//g,'-')}.csv;
  const blob  = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

  // iPhone/Safari: abre o arquivo em nova aba para salvar manualmente
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS || isSafari) {
    const reader = new FileReader();
    reader.onload = function() {
      const a = document.createElement('a');
      a.href = reader.result;
      a.download = fname;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
    reader.readAsDataURL(blob);
  } else {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  const btn = document.getElementById('btn-excel-main');
  const orig = btn.textContent;
  btn.textContent = '✓ Baixado!';
  setTimeout(() => btn.textContent = orig, 2500);
}

buildList();
updateStats();
</script>
